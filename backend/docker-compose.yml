services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kajamart
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      - db
    ports:
      - "3000:3000"
    environment:
      # Prisma suele leer DATABASE_URL
      DATABASE_URL: postgres://postgres:postgres@db:5432/kajamart
      NODE_ENV: production
    # Si tu API usa uploads/logs y quieres persistirlos:
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs

volumes:
  pgdata:
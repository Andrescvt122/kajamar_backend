services:
  api:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: sh -c "npm install && npx prisma generate && npm run dev"

volumes:
  node_modules: